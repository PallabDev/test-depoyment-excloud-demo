<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pani Nikal Dunga</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes wave {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        @keyframes bubble {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-600px) scale(1.5);
                opacity: 0;
            }
        }

        .floating {
            animation: float 3s ease-in-out infinite;
        }

        .wave {
            animation: wave 10s linear infinite;
        }

        .bubble {
            position: absolute;
            bottom: -50px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.4);
            animation: bubble linear infinite;
        }
    </style>
</head>

<body
    class="overflow-hidden bg-gradient-to-b from-sky-400 via-blue-500 to-blue-800 min-h-screen flex items-center justify-center">

    <!-- Bubbles -->
    <div class="bubble w-4 h-4 left-[10%]" style="animation-duration: 8s;"></div>
    <div class="bubble w-6 h-6 left-[25%]" style="animation-duration: 10s;"></div>
    <div class="bubble w-3 h-3 left-[40%]" style="animation-duration: 7s;"></div>
    <div class="bubble w-8 h-8 left-[60%]" style="animation-duration: 12s;"></div>
    <div class="bubble w-5 h-5 left-[80%]" style="animation-duration: 9s;"></div>

    <!-- Main Content -->
    <div class="relative z-10 text-center px-4">
        <div class="floating text-8xl mb-6">
            🚰
        </div>

        <h1 class="text-5xl md:text-8xl font-black text-white drop-shadow-[0_5px_20px_rgba(0,0,0,0.5)]">
            Pani Nikal Dunga
        </h1>

        <p class="mt-6 text-xl md:text-2xl text-blue-100 font-semibold">
            Professional Water Evacuation Services 💦
        </p>

        <div class="mt-8">
            <span
                class="inline-block bg-white/20 backdrop-blur-md px-6 py-3 rounded-full text-white font-bold border border-white/30">
                🌊 Fast • Reliable • Waterproof
            </span>
        </div>
    </div>

    <!-- Animated Waves -->
    <div class="absolute bottom-0 left-0 w-[200%] h-48 opacity-50 wave">
        <svg viewBox="0 0 1200 200" class="w-full h-full">
            <path fill="#ffffff" d="M0,100 C150,180 350,20 600,100 C850,180 1050,20 1200,100 L1200,200 L0,200 Z">
            </path>
        </svg>
    </div>

    <div class="absolute bottom-0 left-0 w-[200%] h-32 opacity-30 wave" style="animation-duration:15s;">
        <svg viewBox="0 0 1200 200" class="w-full h-full">
            <path fill="#ffffff" d="M0,120 C200,20 400,180 600,120 C800,20 1000,180 1200,120 L1200,200 L0,200 Z">
            </path>
        </svg>
    </div>

</body>

</html>
