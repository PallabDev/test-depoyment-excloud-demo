<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cyber Water Volcano</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050510;
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
        }

        /* Cinematic Text Overlay */
        .ui-container {
            position: absolute;
            top: 10%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .epic-text {
            color: #ffffff;
            font-size: 5rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-align: center;
            background: linear-gradient(45deg, #00f5d4, #00b4d8, #6723ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(0, 245, 212, 0.6));
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>

<body>

    <div class="ui-container">
        <h1 class="epic-text" id="headline">pani nikal dunga</h1>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. SETUP THREE.JS SCENE ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 35, 70);
        camera.lookAt(0, 15, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- 2. LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0x0a1128, 1.5);
        scene.add(ambientLight);

        // Glowing blue light coming from inside the volcano crater
        const craterLight = new THREE.PointLight(0x00f5d4, 8, 100);
        craterLight.position.set(0, 16, 0);
        scene.add(craterLight);

        // Directional rim light for 3D depth
        const dirLight = new THREE.DirectionalLight(0x00b4d8, 2);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // --- 3. CREATE 3D VOLCANO (Cyber Mesh Style) ---
        // Cone Geometry: radiusTop, radiusBottom, height, radialSegments, heightSegments, openEnded
        const volcanoGeo = new THREE.ConeGeometry(4, 25, 20, 16, 4, true);
        const volcanoMat = new THREE.MeshStandardMaterial({
            color: 0x111625,
            roughness: 0.6,
            metalness: 0.8,
            wireframe: false,
            flatShining: true
        });
        const volcano = new THREE.Mesh(volcanoGeo, volcanoMat);
        volcano.position.y = 10; // Shift up so base rests on floor
        scene.add(volcano);

        // Glowing rim inside the crater opening
        const rimGeo = new THREE.TorusGeometry(4, 0.4, 8, 24);
        const rimMat = new THREE.MeshBasicMaterial({ color: 0x00f5d4 });
        const rim = new THREE.Mesh(rimGeo, rimMat);
        rim.position.set(0, 20, 0);
        rim.rotation.x = Math.PI / 2;
        scene.add(rim);

        // --- 4. CYBER FLOORS / BACKGROUND ---
        const gridHelper = new THREE.GridHelper(200, 40, 0x00b4d8, 0x0a1128);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // --- 5. HIGH-DENSITY FLUID PARTICLE ENGINE ---
        const particleCount = 400;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = [];

        // Instantiating positions right inside the crater mouth
        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = 0;
            positions[i * 3 + 1] = 20; // Starting at crater lip height
            positions[i * 3 + 2] = 0;

            // Generate physics vectors for pressure eruptions
            velocities.push({
                x: (Math.random() - 0.5) * 0.4,
                y: Math.random() * 0.6 + 0.4, // Upward thrust force
                z: (Math.random() - 0.5) * 0.4,
                gravity: 0.015,
                activeDelay: Math.random() * 5 // Staggered entry
            });
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // Create sleek glowing sphere map textures via canvas for water glow look
        const pCanvas = document.createElement('canvas');
        pCanvas.width = 16; pCanvas.height = 16;
        const pCtx = pCanvas.getContext('2d');
        const grad = pCtx.createRadialGradient(8, 8, 0, 8, 8, 8);
        grad.addColorStop(0, 'rgba(255,255,255,1)');
        grad.addColorStop(0.3, 'rgba(0,180,216,0.8)');
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        pCtx.fillStyle = grad; pCtx.fillRect(0, 0, 16, 16);
        const pTexture = new THREE.CanvasTexture(pCanvas);

        const particleMat = new THREE.PointsMaterial({
            size: 2.2,
            map: pTexture,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const waterStream = new THREE.Points(geometry, particleMat);
        scene.add(waterStream);

        // --- 6. GSAP KINETICS & EFFECTS ---
        // Animate Text Gradient
        gsap.to("#headline", {
            backgroundPosition: "200% center",
            duration: 4,
            repeat: -1,
            ease: "none"
        });

        // Pulsing headline size matching pressure
        gsap.to("#headline", {
            scale: 1.05,
            duration: 0.4,
            repeat: -1,
            yoyo: true,
            ease: "power1.inOut"
        });

        // Subtle Camera rotation over time
        let targetCameraX = 0;
        window.addEventListener('mousemove', (e) => {
            targetCameraX = (e.clientX - window.innerWidth / 2) * 0.03;
        });

        // --- 7. ANIMATION TICK LOOP (Physics Calculations) ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const posArray = waterStream.geometry.attributes.position.array;

            // Loop through all particles and apply mathematical gravity + velocity
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                let v = velocities[i];

                // Update physics positions
                posArray[i3] += v.x;
                posArray[i3 + 1] += v.y; // Y coordinate (Altitude)
                posArray[i3 + 2] += v.z;

                // Apply Gravity Acceleration pull downward over time
                v.y -= v.gravity;

                // Collision detection or bottom floor boundary reset
                if (posArray[i3 + 1] < 0 || (v.y < 0 && posArray[i3 + 1] < 20 && Math.abs(posArray[i3]) > 10)) {
                    // Respawn drop inside core reset
                    posArray[i3] = (Math.random() - 0.5) * 1;
                    posArray[i3 + 1] = 20;
                    posArray[i3 + 2] = (Math.random() - 0.5) * 1;

                    // Recalculate aggressive ejection speed
                    v.x = (Math.random() - 0.5) * 0.5;
                    v.y = Math.random() * 0.7 + 0.4;
                    v.z = (Math.random() - 0.5) * 0.5;
                }
            }

            // Signal Three.js to re-render updated vertices positions
            waterStream.geometry.attributes.position.needsUpdate = true;

            // Camera follow updates & organic rumbling shake calculations via math waves
            volcano.rotation.y = elapsedTime * 0.05;
            camera.position.x += (targetCameraX - camera.position.x) * 0.05;

            // Kinetic micro-shaking effect
            camera.position.y += Math.sin(elapsedTime * 70) * 0.07;
            camera.position.x += Math.cos(elapsedTime * 70) * 0.07;

            renderer.render(scene, camera);
        }

        animate();

        // --- 8. RESPONSIVE SCALE VIEWPORTS ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>

</html>
