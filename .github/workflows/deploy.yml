name: Pallab-Excloud Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: pallabdev/pallab-base:latest

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: 210.79.129.141
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            sudo docker pull pallabdev/pallab-base:latest
            sudo docker stop pallab-server || true
            sudo docker rm pallab-server || true
            sudo docker run -d \
              --name pallab-server \
              -p 3000:3000 \
              pallabdev/pallab-base:latest
